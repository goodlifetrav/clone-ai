server {
    listen 80;
    server_name srv1575473.hstgr.cloud;

    # Increase body size limit for image uploads in chat
    client_max_body_size 20M;

    # Proxy all requests to Next.js on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for SSE streaming (clone progress steps)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — cloning can take 30-60s
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # Serve Next.js static assets directly from disk (faster, no Node.js hop)
    location /_next/static/ {
        alias /var/www/cloneai/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        alias /var/www/cloneai/public/favicon.ico;
        access_log off;
    }

    location /public/ {
        alias /var/www/cloneai/public/;
        access_log off;
    }
}
