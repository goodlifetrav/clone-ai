services:
  cloneai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
    command: ["sh", "startup.sh"]
    # No playwright-cache volume — Chromium is baked into the Docker image layer.
    # Mounting a volume at /root/.cache/ms-playwright would shadow the baked
    # browsers and force a re-download on every fresh container.
